name: RaceEdge CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: raceedge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: raceedge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Build client bundle
        run: npm run build

      - name: Build Docker image
        run: docker build -t raceedge-ci .
